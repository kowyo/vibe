name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: bun install
    
    - name: Run linter
      run: bun run lint
    
    - name: Run formatter check
      run: bun run format --check
    
    - name: Run dead code detection
      run: bun run knip
    
    - name: Run TypeScript check
      run: bun tsc --noEmit
    
    - name: Run tests
      run: bun run test --coverage
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  backend-quality:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        uv venv
        uv pip install -e ".[dev]"
    
    - name: Run linter
      working-directory: ./backend
      run: uv run ruff check .
    
    - name: Run type checking
      working-directory: ./backend
      run: uv run mypy .
    
    - name: Run security check
      working-directory: ./backend
      run: uv run pip-audit
    
    - name: Run tests
      working-directory: ./backend
      env:
        CLAUDE_APP_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        CLAUDE_APP_BETTER_AUTH_SECRET: test-secret-key
        CLAUDE_APP_BETTER_AUTH_URL: http://localhost:3000
      run: uv run pytest --cov=app --cov-report=xml --cov-report=term
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security audit (frontend)
      run: |
        npm install -g audit-ci
        audit-ci --moderate
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Run security audit (backend)
      working-directory: ./backend
      run: |
        uv venv
        uv pip install pip-audit
        uv run pip-audit --desc --format=json

  build-test:
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-quality]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: bun install
    
    - name: Build frontend
      run: bun run build
      env:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000